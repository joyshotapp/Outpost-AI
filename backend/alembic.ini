# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to the constructor of datetime.datetime
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of migration files
# when using the autogenerate feature
# defaults to 40
# max_identifier_length = 40

# whether to compare type and server default for autogenerated
# migrations
# On PostgreSQL, this will actually test the length of the default
# value, matching the length specified in the column
# compare_type = false

# whether to compare name of index for autogenerated migrations
# compare_name = false

# whether to compare constraints for autogenerated migrations
# compare_server_default = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
